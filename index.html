<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Calci</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="calculator-card">
      <div class="card-glow"></div>
      <div class="display-panel">
        <p class="eyebrow">Secret Calci</p>
        <p class="history" id="history">Ready</p>
        <input id="display" class="display" type="text" value="0" readonly aria-label="Calculator display">
        <p class="hint">Type normally. A certain code unlocks something extra.</p>
      </div>

      <div class="keypad">
        <button class="key key-soft" data-action="clear">AC</button>
        <button class="key key-soft" data-action="delete">DEL</button>
        <button class="key key-soft" data-value="%">%</button>
        <button class="key key-op" data-value="/">/</button>

        <button class="key key-soft" data-action="sqrt">sqrt</button>
        <button class="key key-soft" data-action="square">x²</button>
        <button class="key key-soft" data-action="reciprocal">1/x</button>
        <button class="key key-op" data-value="*">x</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key key-op" data-value="-">-</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key key-op" data-value="+">+</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key key-accent key-tall" data-action="equals">=</button>

        <button class="key key-wide" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
